project: tdx-api-collector
goal: full automated safe collector

current_phase:
  id: phase_3
  name: Historical Trade
  status: in_progress

next_phase:
  id: phase_4
  name: Order History

current_task:
  id: phase_3_task_1
  summary: Move historical trade ingestion to DB-first storage with replay-safe publish and derived-bar reproducibility.

required_read_order:
  - docs/collector/START_HERE.md
  - docs/collector/MASTER_PLAN.md
  - docs/collector/PROGRESS.md
  - docs/collector/STATE.yaml
  - docs/collector/TEST_MATRIX.md
  - docs/collector/DATA_CONTRACT.md
  - docs/collector/WORK_LOG.md

allowed_to_commit: true
allowed_to_advance: false

phase_exit_criteria:
  - trade_db_first_publish_ready
  - trade_replay_dedupe_ready
  - trade_derived_bar_reproducible
  - trade_validation_checks_green

last_verified_commit: null
last_verified_at: "2026-04-02 03:10:33 CST"
last_test_suite:
  - go test ./...
  - cd web && go test ./...
  - go test ./collector -run 'TestKlineRefreshPublishesAndPersistsCursor|TestKlineRefreshIsOverlapSafeAcrossRestart|TestKlineRefreshRecordsGap|TestMetadataRefreshPublishesCodesAndWorkdays|TestMetadataRefreshIsReplaySafeAcrossRestart|TestCollectorCoreAvoidsDirectTDXCoupling|TestDocsConsistency' -v

blocking_issues: []

required_evidence:
  - exact commands
  - exact test results
  - updated progress file
  - updated work log
  - updated state file

anti_fabrication_rules:
  - no inferred field semantics may be promoted to fact without evidence
  - no phase may be marked done without passing blocking tests
  - no downstream phase work is allowed before current phase exit
  - no publish without staging and validation
  - no collector core feature may be added through direct dependency on tdx-api internals once provider decoupling starts
