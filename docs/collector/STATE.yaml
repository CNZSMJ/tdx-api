project: tdx-api-collector
goal: full automated safe collector

current_phase:
  id: phase_6
  name: Fundamentals
  status: in_progress

next_phase:
  id: phase_7
  name: Final Acceptance

current_task:
  id: phase_6_task_1
  summary: Add finance and F10 periodic sync with idempotent refresh, content persistence, and unresolved-field-safe contracts.

required_read_order:
  - docs/collector/START_HERE.md
  - docs/collector/MASTER_PLAN.md
  - docs/collector/PROGRESS.md
  - docs/collector/STATE.yaml
  - docs/collector/TEST_MATRIX.md
  - docs/collector/DATA_CONTRACT.md
  - docs/collector/WORK_LOG.md

allowed_to_commit: true
allowed_to_advance: false

phase_exit_criteria:
  - finance_storage_ready
  - f10_storage_ready
  - fundamentals_replay_safe
  - fundamentals_validation_checks_green

last_verified_commit: null
last_verified_at: "2026-04-02 03:20:18 CST"
last_test_suite:
  - go test ./...
  - cd web && go test ./...
  - go test ./collector -run 'TestLiveCaptureStoresQuotesAndSessionData|TestLiveCaptureReplayAndReconcileAreSafe|TestOrderHistoryRefreshPublishesDBFirstAndPersistsCursor|TestOrderHistoryReplayPreservesRawDeltaValues|TestTradeRefreshPublishesDBFirstAndPersistsCursor|TestTradeRefreshIsReplaySafeAndDerivedBarsAreReproducible|TestKlineRefreshPublishesAndPersistsCursor|TestKlineRefreshIsOverlapSafeAcrossRestart|TestKlineRefreshRecordsGap|TestMetadataRefreshPublishesCodesAndWorkdays|TestMetadataRefreshIsReplaySafeAcrossRestart|TestCollectorCoreAvoidsDirectTDXCoupling|TestDocsConsistency' -v

blocking_issues: []

required_evidence:
  - exact commands
  - exact test results
  - updated progress file
  - updated work log
  - updated state file

anti_fabrication_rules:
  - no inferred field semantics may be promoted to fact without evidence
  - no phase may be marked done without passing blocking tests
  - no downstream phase work is allowed before current phase exit
  - no publish without staging and validation
  - no collector core feature may be added through direct dependency on tdx-api internals once provider decoupling starts
